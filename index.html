<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תחזית שקיעות - צבעים מטורפים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="stars-overlay"></div>
    
    <div class="container">
        <header>
            <h1>תחזית שקיעות</h1>
            <p class="subtitle">האם תהיה שקיעה יפה עם צבעים מטורפים השבוע?</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="חפש עיר (למשל: תל אביב, ירושלים)..." autocomplete="off">
                <button id="search-btn" title="חפש">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <button id="location-btn" class="glass-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                השתמש במיקום הנוכחי שלי
            </button>
        </section>

        <main id="forecast-container" class="hidden">
            <h2 id="location-name">תחזית עבור...</h2>
            <div id="loader" class="loader hidden"></div>
            <div class="forecast-grid" id="forecast-grid">
                <!-- Forecast cards will be injected here via JavaScript -->
            </div>
        </main>
        
        <div id="error-message" class="error-msg hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
